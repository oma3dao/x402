name: Publish @x402/fetch package to NPM

on:
  workflow_dispatch:

jobs:
  publish-npm-x402-fetch:
    if: github.repository == 'x402-foundation/x402' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11.1.1
      
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      
      - name: Update npm for OIDC trusted publishing
        run: npm install -g npm@11.14.1 --ignore-scripts
      
      - name: Configure npm for trusted publishing
        run: npm config delete always-auth 2>/dev/null || true
      
      - name: Install and build
        working-directory: ./typescript
        run: |
          pnpm install --frozen-lockfile --ignore-scripts
          pnpm -r --filter=@x402/core --filter=@x402/fetch run build
      
      - name: Publish @x402/fetch package
        working-directory: ./typescript/packages/http/fetch
        run: |
          # Get package information directly
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          
          echo "Package: $PACKAGE_NAME@$PACKAGE_VERSION"
          
          echo "Publishing to NPM (main branch)"
          pnpm publish --provenance --access public

